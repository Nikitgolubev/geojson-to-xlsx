<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    style-src 'self' 'unsafe-inline';
    script-src 'self';
    connect-src 'self';
    img-src 'self' data: https://*.tile.openstreetmap.org;
  " />
  <title>polygons</title>
  <link rel="stylesheet" href="vendor/leaflet/leaflet.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="layout">
    <!-- Боковая навигация -->
    <aside class="sidebar">
      <div class="brand">
        <svg class="brand-mark" width="22" height="22" viewBox="0 0 24 24" aria-hidden="true">
          <polygon points="12,2 21,7 21,17 12,22 3,17 3,7"
                   fill="#f5841f" stroke="#cc6600" stroke-width="1.5" stroke-linejoin="round"/>
        </svg>
        <span class="brand-name">polygons</span>
      </div>
      <nav class="nav" id="nav">
        <button class="nav-item" data-view="zones">
          <span class="nav-ico">🗂️</span><span>Зоны</span>
          <span class="nav-badge" id="zonesBadge" hidden></span>
        </button>
        <button class="nav-item" data-view="catalog">
          <span class="nav-ico">🏙️</span><span>Города</span>
        </button>
        <button class="nav-item" data-view="map">
          <span class="nav-ico">🗺️</span><span>Карта</span>
        </button>
        <button class="nav-item" data-view="addrcheck">
          <span class="nav-ico">📍</span><span>Проверка адреса</span>
        </button>
        <button class="nav-item" data-view="log">
          <span class="nav-ico">📝</span><span>Журнал</span>
        </button>
      </nav>
      <div class="sidebar-foot">
        <button id="themeToggle" class="theme-toggle" type="button" title="Тёмная тема">🌙</button>
        <span class="version">v0.5.1</span>
      </div>
    </aside>

    <!-- Разделитель для изменения ширины сайдбара перетаскиванием -->
    <div class="sidebar-resizer" id="sidebarResizer" title="Потяните, чтобы изменить ширину"></div>

    <!-- Основная область -->
    <main class="content">
      <header class="content-head">
        <h1 id="viewTitle">Зоны</h1>
        <div id="viewActions" class="view-actions"></div>
      </header>
      <section id="viewBody" class="view-body"></section>
    </main>
  </div>

  <!-- Контейнеры для модалок и тостов -->
  <div id="modalRoot"></div>
  <div id="toastRoot" class="toast-root"></div>

  <!-- Скрипты (без сборщика, порядок важен) -->
  <script src="vendor/leaflet/leaflet.js"></script>
  <script src="../shared/geojson.js"></script>
  <script src="app.js"></script>
  <script src="views/catalog.js"></script>
  <script src="views/zones.js"></script>
  <script src="views/map.js"></script>
  <script src="views/addrcheck.js"></script>
  <script src="views/log.js"></script>
  <script src="boot.js"></script>
</body>
</html>
