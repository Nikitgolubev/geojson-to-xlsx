```html
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Кнопки: HELLO / HI / GOOD LUCK</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      display: flex;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      background: #f5f6f8;
    }
    .container {
      text-align: center;
      padding: 24px;
    }
    .buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }
    button {
      cursor: pointer;
      border: none;
      border-radius: 10px;
      padding: 12px 18px;
      background: #1f6feb;
      color: #fff;
      font-size: 16px;
      transition: transform 0.04s ease-in-out, background 0.2s;
    }
    button:hover { background: #175bcc; }
    button:active { transform: scale(0.98); }

    .overlay {
      position: fixed;
      inset: 0;
      background: #0b0f19;
      color: #ffffff;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 24px;
      text-align: center;
    }
    .overlay.show { display: flex; }
    .overlay-text {
      font-weight: 800;
      letter-spacing: 1px;
      line-height: 1.1;
      word-break: break-word;
      font-size: clamp(48px, 12vw, 140px);
      text-shadow: 0 6px 24px rgba(0,0,0,0.35);
      user-select: none;
    }
    .close-hint {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 14px;
      color: #b6c2ff;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Выберите сообщение</h1>
    <div class="buttons">
      <button data-text="HELLO">Показать HELLO</button>
      <button data-text="HI">Показать HI</button>
      <button data-text="GOOD LUCK!">Показать GOOD LUCK!</button>
    </div>
  </div>

  <div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-label="Полноэкранное сообщение">
    <div class="overlay-text" id="overlayText"></div>
    <div class="close-hint">Нажмите в любом месте или Esc, чтобы закрыть</div>
  </div>

  <script>
    const overlay = document.getElementById('overlay');
    const overlayText = document.getElementById('overlayText');

    document.querySelectorAll('button[data-text]').forEach(btn => {
      btn.addEventListener('click', () => showFullScreenText(btn.dataset.text));
    });

    function showFullScreenText(text) {
      overlayText.textContent = text;
      overlay.classList.add('show');
    }

    overlay.addEventListener('click', () => overlay.classList.remove('show'));
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') overlay.classList.remove('show');
    });
  </script>
</body>
</html>
